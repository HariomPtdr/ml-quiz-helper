services:
  - type: web
    name: quiz-helper
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: ADMIN_TOKEN
        sync: false
      - key: PORT
        value: 3000
    disk:
      name: quiz-data
      mountPath: /app/data
      sizeGB: 1
